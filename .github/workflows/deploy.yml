name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  OWNER: tsunset  # lowercase — требование GHCR

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Сборка трёх образов на GitHub-машине (4 CPU / 16 GB) и push в GHCR
  # ────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # нужно для push в ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # автоматический токен Actions

      # ── Backend (Go) ────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/yandexbug-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Telegram bot (Go) ───────────────────────────────────────────────────
      - name: Build & push telegram-bot
        uses: docker/build-push-action@v5
        with:
          context: ./telegram-bot
          push: true
          tags: ghcr.io/${{ env.OWNER }}/yandexbug-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend (Next.js) — NEXT_PUBLIC_* запекаются в образ ───────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/yandexbug-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_TG_BOT_USERNAME=${{ secrets.NEXT_PUBLIC_TG_BOT_USERNAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Деплой: просто docker compose pull + up на сервере
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Авторизоваться в GHCR чтобы тянуть образы
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u tsunset --password-stdin

            cd /opt/yandexbug

            # Обновить compose-файл
            git pull origin master

            # Скачать свежие образы (без сборки!)
            docker compose pull

            # Перезапустить только изменившиеся контейнеры
            docker compose up -d --remove-orphans

            # Удалить старые неиспользуемые образы
            docker image prune -f

            echo "Deploy complete!"
